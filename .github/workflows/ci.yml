name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend lint & type-check ─────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: python -m ruff check src/ tests/

      - name: Ruff — format check
        run: python -m ruff format --check src/ tests/

      - name: mypy — domain + application (strict)
        run: |
          python -m mypy \
            src/verida/domain/ \
            src/verida/application/ \
            --strict

  # ── Backend security scan ─────────────────────────────────────────────────
  backend-security:
    name: Backend — Security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Bandit — SAST
        run: |
          python -m bandit \
            -r src/verida/ \
            -ll \
            -f json \
            -o ../bandit-report.json \
          || (cat ../bandit-report.json && exit 1)

      - name: pip-audit — dependency vulnerabilities
        run: python -m pip_audit --requirement <(pip freeze) --format json \
          || true  # warn-only until pinned lockfile exists

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Backend tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Provide real services for integration tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verida
          POSTGRES_PASSWORD: verida
          POSTGRES_DB: verida_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      ENVIRONMENT: development
      # CI-safe secret key — not used in production
      SECRET_KEY: ci-secret-key-that-is-at-least-32-characters-long!
      DATABASE_URL: postgresql+asyncpg://verida:verida@localhost:5432/verida_test
      REDIS_URL: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=src/verida \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Frontend type-check & lint ────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Type-check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  # ── Secret scanning ───────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Summary gate ──────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-security
      - backend-test
      - frontend-lint
      - secret-scan
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed. ✅"
